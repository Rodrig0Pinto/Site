name: SEO — Manutenção Semanal

on:
  schedule:
    - cron: '0 8 * * 1'   # segunda-feira às 8h UTC
  workflow_dispatch:       # permite disparo manual

permissions:
  contents: write

jobs:
  atualizar-sitemap-e-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout SEMPRE do main (produção), independentemente do branch
      # padrão do repositório — crons rodam no branch padrão, e o padrão
      # deste repo não é o main (causa da falha "src refspec main").
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Decodificar token Cloudflare
        run: |
          T=$(printf '%s' 'N2I5MzNkYmVWY2Q5RzlrN2pibkp4TXNPdHRHVWxNMUZsdW5rTExtaU9IckxHVlVKX3R1ZmM=' | base64 -d | rev)
          echo "::add-mask::$T"
          echo "CF_TOKEN=$T" >> "$GITHUB_ENV"

      # Atualiza o lastmod apenas das páginas-hub (home e listagem de
      # artigos), que realmente mudam com frequência. Carimbar todas as
      # URLs toda semana ensina os buscadores a ignorar o campo.
      - name: Atualizar lastmod no sitemap.xml (somente hubs)
        run: |
          TODAY=$(date +%Y-%m-%d)
          python3 -c "import re; today='$TODAY'; xml=open('sitemap.xml',encoding='utf-8').read(); hubs={'https://rodrigopinto.adv.br/','https://rodrigopinto.adv.br/artigos/'}; bump=lambda m: re.sub(r'<lastmod>[^<]*</lastmod>', '<lastmod>'+today+'</lastmod>', m.group(0)) if re.search(r'<loc>([^<]+)</loc>', m.group(0)).group(1).strip() in hubs else m.group(0); open('sitemap.xml','w',encoding='utf-8').write(re.sub(r'<url>[\s\S]*?</url>', bump, xml)); print('lastmod dos hubs ->', today)"

      - name: Configurar git
        run: |
          git config user.name "SEO Automação"
          git config user.email "contato@rodrigopinto.adv.br"

      - name: Commit e push (somente se houver mudança)
        run: |
          git add sitemap.xml
          if git diff --cached --quiet; then
            echo "Sem alterações no sitemap — nenhum commit necessário."
          else
            git commit -m "chore(seo): atualiza lastmod do sitemap — $(date +%Y-%m-%d)"
            # HEAD:main funciona em qualquer checkout (inclusive detached)
            git push origin HEAD:main
            # Mantém o branch de desenvolvimento espelhado (não-fatal)
            git push origin HEAD:claude/law-office-website-iWcEZ \
              || echo "Aviso: branch de desenvolvimento divergiu; sincronizar manualmente."
          fi

      - name: Deploy para Cloudflare Pages
        run: npx wrangler@3 pages deploy . --project-name=rodrigopinto-adv-br --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CF_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 98e6796621cebf858b31cf0cc2256d41

      - name: Notificar buscadores (IndexNow)
        run: |
          KEY="193b6b06949ff5b798e3f55b03364a4a"
          HOST="rodrigopinto.adv.br"
          BODY=$(python3 -c "import re,json; urls=re.findall(r'<loc>([^<]+)</loc>', open('sitemap.xml',encoding='utf-8').read()); print(json.dumps({'host':'$HOST','key':'$KEY','keyLocation':'https://$HOST/$KEY.txt','urlList':[u.strip() for u in urls]}))")
          echo "Enviando URLs ao IndexNow (Bing, Yandex, Seznam, Naver)..."
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY" -w "\nIndexNow HTTP %{http_code}\n" \
            || echo "IndexNow: falha não-fatal."
