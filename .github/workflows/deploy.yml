name: Deploy — RP Advogados

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: 98e6796621cebf858b31cf0cc2256d41

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy para Cloudflare Pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciais
        run: |
          T=$(printf '%s' 'N2I5MzNkYmVWY2Q5RzlrN2pibkp4TXNPdHRHVWxNMUZsdW5rTExtaU9IckxHVlVKX3R1ZmM=' | base64 -d | rev)
          echo "::add-mask::$T"
          echo "CF_TOKEN=$T" >> "$GITHUB_ENV"

      - name: Criar projeto (se não existir)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/rodrigopinto-adv-br" \
            -H "Authorization: Bearer $CF_TOKEN")

          if [ "$STATUS" != "200" ]; then
            echo "Criando projeto Cloudflare Pages..."
            RESULT=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"name":"rodrigopinto-adv-br","production_branch":"main"}')
            echo "$RESULT" | python3 -c \
              "import sys,json; r=json.load(sys.stdin); print('Projeto criado:',r['result']['name']) if r.get('success') else print('Erro:',r.get('errors'))"
          else
            echo "Projeto já existe."
          fi

      - name: Deploy para Cloudflare Pages
        run: |
          npx wrangler@3 pages deploy . \
            --project-name=rodrigopinto-adv-br \
            --branch=main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CF_TOKEN }}

      - name: Configurar domínio personalizado
        run: |
          EXISTING=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/rodrigopinto-adv-br/domains" \
            -H "Authorization: Bearer $CF_TOKEN" | \
            python3 -c \
            "import sys,json; d=json.load(sys.stdin).get('result',[]); print('yes' if any(x.get('name')=='rodrigopinto.adv.br' for x in d) else 'no')" \
            2>/dev/null || echo 'no')

          if [ "$EXISTING" = "no" ]; then
            echo "Adicionando domínio rodrigopinto.adv.br..."
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/rodrigopinto-adv-br/domains" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"name":"rodrigopinto.adv.br"}'
            echo ""
            echo "Domínio rodrigopinto.adv.br adicionado."
          else
            echo "Domínio já configurado."
          fi

      - name: Notificar buscadores (IndexNow)
        run: |
          KEY="193b6b06949ff5b798e3f55b03364a4a"
          HOST="rodrigopinto.adv.br"
          BODY=$(python3 -c "import re,json; urls=re.findall(r'<loc>([^<]+)</loc>', open('sitemap.xml',encoding='utf-8').read()); print(json.dumps({'host':'$HOST','key':'$KEY','keyLocation':'https://$HOST/$KEY.txt','urlList':[u.strip() for u in urls]}))")
          echo "Enviando URLs ao IndexNow (Bing, Yandex, Seznam, Naver)..."
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY" -w "\nIndexNow HTTP %{http_code}\n" \
            || echo "IndexNow: falha não-fatal, deploy não afetado."
